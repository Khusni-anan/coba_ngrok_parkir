<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pusat Kendali Multi-CCTV Smart Parking</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #11111e; color: #fff; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 1400px; margin: auto; background: #1e1e2f; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.7); }
        .btn-connect { background-color: #28a745; padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; border: none; border-radius: 6px; color: white; margin-bottom: 25px; transition: 0.3s; }
        .btn-connect:hover { background-color: #218838; transform: scale(1.02); }
        
        /* Mengatur susunan Grid Monitor CCTV bersebelahan */
        .cctv-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 10px; }
        
        .cctv-box { background: #000; border-radius: 8px; border: 3px solid #333; overflow: hidden; position: relative; min-height: 400px; display: flex; align-items: center; justify-content: center; }
        .cctv-box img { width: 100%; height: auto; display: none; }
        .cctv-label { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; border: 1px solid red; color: red; font-weight: bold; font-size: 12px; }
        .placeholder-text { color: #555; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎛️ Pusat Kendali Multi-CCTV Smart Parking (YOLOv11)</h1>
    <button class="btn-connect" onclick="hubungkanSemuaCCTV()">🔌 Aktifkan Semua Kamera Sistem</button>

    <div class="cctv-grid">
        <div class="cctv-box">
            <span class="cctv-label">🔴 LIVE CH-01</span>
            <span id="p1" class="placeholder-text">Kamera Utama Gate Masuk (Offline)</span>
            <img id="cam1" alt="CCTV 1">
        </div>

        <div class="cctv-box">
            <span class="cctv-label">🔴 LIVE CH-02</span>
            <span id="p2" class="placeholder-text">Kamera Cadangan Lantai 2 (Offline)</span>
            <img id="cam2" alt="CCTV 2">
        </div>
    </div>
</div>

<script>
    // URL Tautan Permanen LocalTunnel Anda
    const baseUrl = "https://smart-parking-yolov11.loca.lt";

    function hubungkanSemuaCCTV() {
        const cam1 = document.getElementById('cam1');
        const cam2 = document.getElementById('cam2');
        const p1 = document.getElementById('p1');
        const p2 = document.getElementById('p2');

        // Menembak ke masing-masing endpoint multi-feed di Colab
        cam1.src = `${baseUrl}/video_feed/1`;
        cam2.src = `${baseUrl}/video_feed/2`;

        cam1.style.display = "block";
        cam2.style.display = "block";
        p1.style.display = "none";
        p2.style.display = "none";
    }
</script>

</body>
</html>
